<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ZENIT - Cartas semanales sobre crecimiento personal" />
  <title>ZENIT - Cartas semanales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Montserrat:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --jade: #008a5c;
      --beige: #F5F5DC;
      --text: #1f2a24;
      --muted: #5f6f66;
      --white: #ffffff;
      --error: #d32f2f;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--beige);
      color: var(--text);
      line-height: 1.6;
      font-weight: 400;
    }
    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .landing {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }
    .brand {
      font-family: 'Crimson Text', serif;
      font-size: clamp(5rem, 14vw, 7rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--jade);
      margin-bottom: 20px;
      line-height: 1.15;
    }
    .subtitle {
      font-family: 'Crimson Text', serif;
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      font-style: italic;
      font-weight: 400;
      line-height: 1.7;
      letter-spacing: 0.3px;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 32px;
    }
    .form {
      display: flex;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto 28px;
      background: rgba(255, 255, 255, 0.75);
      padding: 8px;
      border-radius: 50px;
      border: 1px solid rgba(0, 138, 92, 0.25);
    }
    .form input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 12px 14px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-width: 0;
      font-weight: 400;
    }
    .form input::placeholder {
      color: #8a978f;
    }
    .form input:focus {
      background: rgba(255, 255, 255, 0.3);
    }
    .form button {
      border: none;
      cursor: pointer;
      background: var(--jade);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Crimson Text', serif;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .form button:not(:disabled):hover {
      transform: translateY(-3px);
      opacity: 0.85;
      box-shadow: 0 8px 16px rgba(0, 138, 92, 0.25);
    }
    .form button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .form button:disabled:hover {
      transform: none;
      opacity: 0.5;
      box-shadow: none;
    }
    .consent {
      max-width: 480px;
      margin: 0 auto 24px;
      text-align: left;
      background: rgba(0, 138, 92, 0.06);
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid rgba(0, 138, 92, 0.15);
    }
    .consent-checkbox {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .consent-checkbox input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--jade);
      flex-shrink: 0;
    }
    .consent-checkbox label {
      font-family: 'Crimson Text', serif;
      font-size: 0.88rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1.6;
      font-weight: 400;
    }
    .consent-checkbox a {
      color: var(--jade);
      text-decoration: none;
      border-bottom: 1px solid var(--jade);
    }
    .note {
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.2px;
      font-weight: 400;
      line-height: 1.6;
    }
    footer {
      padding: 32px 24px;
      border-top: 1px solid rgba(0, 138, 92, 0.2);
      background: rgba(255, 255, 255, 0.5);
    }
    .footer-content {
      font-family: 'Crimson Text', serif;
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
      font-size: 0.9rem;
      color: #3d4d44;
      font-weight: 400;
      letter-spacing: 0.2px;
    }
    .footer-links {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--jade);
      text-decoration: none;
    }
    @media (max-width: 560px) {
      main {
        padding: 32px 16px;
      }
      .form {
        flex-direction: column;
      }
      .form input,
      .form button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <main>
      <section class="landing">
        <h1 class="brand">ZENIT</h1>
        <p class="subtitle">Cartas semanales sobre lo que vivo y aprendo</p>
        
        <form class="form" id="zenit-form">
          <input type="email" id="email-input" placeholder="Tu email para recibir mis cartas" required />
          <button type="submit" id="submit-btn" disabled>Suscribirse</button>
        </form>

        <div class="consent">
          <div class="consent-checkbox">
            <input type="checkbox" id="privacy-consent" required />
            <label for="privacy-consent">
              Acepto recibir cartas de ZENIT. He leído la <a href="#privacy">política de privacidad</a>.
            </label>
          </div>
        </div>

        <p class="note">Cada domingo, una carta. Sin ruido. Completamente gratis. Puedes darte de baja cuando quieras.</p>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <p>ZENIT © 2026 | Adrián Alcalá</p>
        <div class="footer-links">
          <a href="#privacy">Política de Privacidad</a>
          <a href="mailto:hola@adrianalcala.com">Contacto</a>
        </div>
        <p style="margin-top: 16px; font-size: 0.8rem;">
          Tus datos están protegidos según RGPD.
        </p>
      </div>
    </footer>
  </div>

  <script>
    const form = document.getElementById('zenit-form');
    const emailInput = document.getElementById('email-input');
    const privacyCheckbox = document.getElementById('privacy-consent');
    const submitBtn = document.getElementById('submit-btn');

    const updateButtonState = () => {
      const hasEmail = emailInput.value.trim() !== '';
      const isChecked = privacyCheckbox.checked;
      submitBtn.disabled = !(hasEmail && isChecked);
    };

    emailInput.addEventListener('input', updateButtonState);
    privacyCheckbox.addEventListener('change', updateButtonState);
  </script>
</body>
</html>
