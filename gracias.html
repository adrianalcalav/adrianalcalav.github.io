<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ZENIT - Revisa tu email" />
  <title>ZENIT - Revisa tu email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --jade: #008a5c;
      --beige: #F5F5DC;
      --text: #1f2a24;
      --muted: #5f6f66;
      --white: #ffffff;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--beige);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .brand {
      font-family: 'Crimson Text', serif;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--jade);
      margin-bottom: 20px;
      line-height: 1.15;
    }
    .message {
      font-family: 'Crimson Text', serif;
      font-size: clamp(1.15rem, 3.5vw, 1.35rem);
      font-style: italic;
      font-weight: 400;
      line-height: 1.7;
      letter-spacing: 0.3px;
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto 12px;
    }
    .note {
      font-family: 'Crimson Text', serif;
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✉️</div>
    <h1 class="brand">Casi está</h1>
    <p class="message">Te he enviado un email para confirmar tu suscripción. Solo tienes que hacer clic en el enlace y ya estarás dentro.</p>
    <p class="note">Si no lo ves en la bandeja principal, revisa spam o promociones.</p>
  </div>
</body>
</html>
